<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Claims</title>
<!-- BASELINE: representative default generation (no skill). -->
<style>
body { font-family: 'Inter', sans-serif; font-size: 16px; margin: 0; background: #f9fafb; }
.container { max-width: 1100px; margin: 0 auto; padding: 32px; }
h1 { font-size: 28px; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 24px 0; }
.card { background: white; border: 1px solid #e5e7eb; border-radius: 14px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,.05); }
.value { font-size: 30px; font-weight: 700; color: #6366f1; }
.claim { background: white; border: 1px solid #e5e7eb; border-radius: 14px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 2px 6px rgba(0,0,0,.05); display: flex; justify-content: space-between; align-items: center; }
.pill { padding: 5px 14px; border-radius: 9999px; font-size: 13px; background: #fef3c7; color: #92400e; }
.approve { background: #6366f1; color: white; border: none; border-radius: 9999px; padding: 10px 22px; font-size: 15px; }
</style></head><body><div class="container">
<h1>Claims Processing</h1>
<div class="stats">
  <div class="card">Pending<div class="value">84</div></div>
  <div class="card">Approved Today<div class="value">31</div></div>
  <div class="card">Flagged<div class="value">6</div></div>
</div>
<div class="claim"><div><b>Claim #10231</b><br>John Doe - Auto</div><span class="pill">Pending</span><button class="approve">Review</button></div>
<div class="claim"><div><b>Claim #10232</b><br>Jane Doe - Home</div><span class="pill">Pending</span><button class="approve">Review</button></div>
<div class="claim"><div><b>Claim #10233</b><br>John Smith - Auto</div><span class="pill">Pending</span><button class="approve">Review</button></div>
</div></body></html>
