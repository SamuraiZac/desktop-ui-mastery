<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Clipboard Manager</title>
<!-- BASELINE: representative default generation (no skill). -->
<style>
body { font-family: 'Inter', sans-serif; font-size: 16px; margin: 0; background: #f3f4f6; padding: 40px; }
.app { max-width: 700px; margin: 0 auto; }
h1 { font-size: 28px; background: linear-gradient(90deg, #8b5cf6, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
.item { background: white; border: 1px solid #e5e7eb; border-radius: 14px; padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.06); display: flex; justify-content: space-between; align-items: center; }
.copy { background: linear-gradient(90deg, #8b5cf6, #6366f1); color: white; border: none; border-radius: 9999px; padding: 10px 20px; }
.tag { padding: 4px 12px; border-radius: 9999px; background: #ede9fe; color: #6d28d9; font-size: 12px; }
</style></head><body><div class="app">
<h1>Clipboard History</h1>
<div class="item"><div>Lorem ipsum dolor sit amet...</div><span class="tag">Text</span><button class="copy">Copy</button></div>
<div class="item"><div>https://example.com/page</div><span class="tag">Link</span><button class="copy">Copy</button></div>
<div class="item"><div>john@example.com</div><span class="tag">Email</span><button class="copy">Copy</button></div>
</div></body></html>
